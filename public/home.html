<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>RotaLucro - Home</title>

<style>
:root{
  --bg:#0a0f1a;
  --card:#111827;
  --green:#00C853;
  --blue:#0057FF;
  --text:#fff;
  --muted:#94A3B8;
  --border:rgba(255,255,255,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  padding:20px;
}

.header{
  margin-bottom:26px;
}

h1{
  font-size:30px;
  font-weight:800;
}

h1 span{
  color:var(--green);
}

.sub{
  color:var(--muted);
  margin-top:4px;
}

.grid{
  display:grid;
  gap:14px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
  cursor:pointer;
  transition:.15s;
}

.card:active{
  transform:scale(.98);
}

.icon{
  font-size:30px;
  margin-bottom:12px;
}

.card h3{
  font-size:18px;
  margin-bottom:6px;
}

.card p{
  color:var(--muted);
  font-size:14px;
}

.logout{
  margin-top:24px;
  width:100%;
  height:50px;
  border-radius:14px;
  border:0;
  background:#1E293B;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <h1>Rota<span>Lucro</span></h1>
  <p class="sub">Escolha uma opção</p>
</div>

<div class="grid">

  <div class="card" id="btnNovaRota">
    <div class="icon">🗺️</div>
    <h3>Nova rota</h3>
    <p>Criar nova otimização</p>
  </div>

  <div class="card" id="btnHistorico">
    <div class="icon">📋</div>
    <h3>Histórico</h3>
    <p>Visualizar rotas anteriores</p>
  </div>

</div>

<button class="logout" id="btnSair">
  SAIR
</button>

<script>

document.getElementById('btnNovaRota')
.addEventListener('click', function(){
  window.location.href = './mapa.html';
});

document.getElementById('btnHistorico')
.addEventListener('click', function(){
  window.location.href = './historico.html';
});

document.getElementById('btnSair')
.addEventListener('click', function(){

  localStorage.removeItem('rl_user');

  window.location.href = './index.html';

});

</script>

</body>
</html>
