<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>RotaLucro</title>
<style>
:root{--bg:#0a0f1a;--card:#111827;--green:#00C853;--text:#fff;--muted:#94A3B8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text);display:grid;place-items:center;min-height:100dvh;padding:24px}
.login-box{width:100%;max-width:360px;text-align:center}
.logo{width:72px;height:72px;margin:0 auto 20px;background:linear-gradient(135deg,var(--green),#00e676);border-radius:50%;display:grid;place-items:center;box-shadow:0 0 40px rgba(0,200,83,.3)}
.logo svg{width:36px;height:36px}
h1{font-size:30px;font-weight:800;margin-bottom:4px}
h1 span{color:var(--green)}
.sub{color:var(--muted);font-size:14px;margin-bottom:32px}
input{width:100%;height:52px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:0 16px;color:var(--text);font-size:15px;margin-bottom:12px}
input:focus{border-color:var(--green);outline:none}
.btn{width:100%;height:52px;background:var(--green);color:#000;border:0;border-radius:14px;font-weight:800;font-size:16px;cursor:pointer;margin-top:8px}
.btn:active{transform:scale(.98)}
.link{color:var(--muted);font-size:14px;margin-top:20px;display:block;text-align:center;text-decoration:none}
.footer{position:absolute;bottom:28px;left:0;right:0;text-align:center;color:#475569;font-size:12px}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <svg viewBox="0 0 48 48" fill="none"><path d="M12 32c-3-3-4-6-2-10 3-6 10-5 12-10 2-5 7-6 9-4" stroke="#000" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="33" r="4" fill="#000"/><circle cx="34" cy="13" r="4" fill="#000"/><circle cx="26" cy="24" r="3" fill="#000" opacity=".8"/></svg>
  </div>
  <h1>Rota<span>Lucro</span></h1>
  <p class="sub">Otimizador inteligente de rotas</p>
  <input type="email" id="emailInput" placeholder="Email" value="entregador@rotalucro.com">
  <input type="password" id="senhaInput" placeholder="Senha" value="123456">
  <button class="btn" onclick="entrar()">ENTRAR</button>
  <a class="link" href="#">Criar conta grátis</a>
</div>
<div class="footer">Feito por entregadores para entregadores</div>
<script>
function entrar(){
  window.location.href = '/home.html';
}
</script>
</body>
</html>
