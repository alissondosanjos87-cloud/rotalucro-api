<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RotaLucro</title>
  <script>
    // Redireciona para o React
    var path = window.location.pathname;
    if (path === '/' || path === '/index.html') {
      var token = localStorage.getItem('rl_token');
      window.location.replace(token ? '/home.html' : '/login.html');
    }
  </script>
</head>
<body></body>
</html>
