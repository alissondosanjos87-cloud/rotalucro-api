<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>RotaLucro - Mapa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: system-ui, sans-serif; background: #000; color: #fff; overflow: hidden; height: 100dvh; }
    #map { position: absolute; inset: 0; z-index: 1; }
    .topbar { position: absolute; top: 12px; left: 12px; right: 12px; z-index: 1000; display: flex; justify-content: space-between; }
    .menu-btn { width: 44px; height: 44px; border-radius: 12px; background: #111827; border: 1px solid rgba(255,255,255,.1); color: #fff; font-size: 20px; cursor: pointer; }
    .menu-drop { position: absolute; top: 50px; left: 0; display: none; flex-direction: column; gap: 4px; }
    .menu-drop.open { display: flex; }
    .menu-drop button { padding: 10px 14px; border-radius: 8px; border: 0; background: rgba(0,0,0,.9); color: #fff; font-weight: 600; font-size: 12px; cursor: pointer; text-align: left; white-space: nowrap; }
    .clock-box { background: rgba(0,0,0,.9); padding: 8px 12px; border-radius: 10px; border: 2px solid #0057FF; text-align: center; }
    .clock-box .cl { font-size: 9px; color: #94A3B8; text-transform: uppercase; }
    .clock-box .ct { font-size: 14px; font-weight: 700; color: #0057FF; }
    .clock-box .ce { font-size: 10px; color: #aaa; }
    .sheet { position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000; background: #111827; border-radius: 20px 20px 0 0; padding: 12px 16px 16px; box-shadow: 0 -8px 32px rgba(0,0,0,.6); border-top: 3px solid #0057FF; }
    .sheet .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .sheet .row div { text-align: center; }
    .sheet .row span { font-size: 9px; color: #94A3B8; text-transform: uppercase; }
    .sheet .row strong { display: block; font-size: 18px; font-weight: 800; margin-top: 2px; }
    .sheet .row .gr strong { color: #00C853; }
    .btn-start { width: 100%; height: 48px; background: #00C853; color: #000; border: 0; border-radius: 12px; font-weight: 800; font-size: 15px; cursor: pointer; }
    .stops { overflow-y: auto; max-height: 40vh; margin-top: 8px; }
    .stop-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.04); font-size: 13px; }
    .stop-num { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; font-weight: 800; font-size: 12px; color: #fff; flex-shrink: 0; }
    .stop-info .addr { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stop-info .meta { font-size: 10px; color: #94A3B8; }
  </style>
</head>
<body>
<div id="map"></div>
<div class="topbar">
  <button class="menu-btn" onclick="document.getElementById('menuDrop').classList.toggle('open')">☰</button>
  <div class="menu-drop" id="menuDrop">
    <button onclick="gps()">📍 GPS</button>
    <button onclick="reorg()">🔄 REORG.</button>
    <button onclick="verTudo()">🗺️ VER TUDO</button>
    <button onclick="window.location.href='/home.html'">📂 NOVA ROTA</button>
  </div>
  <div class="clock-box" id="clockBox" style="display:none">
    <div class="cl">⏱ TÉRMINO</div>
    <div class="ct" id="tempoTermino">--:--</div>
    <div class="ce" id="infoTermino"></div>
  </div>
</div>
<div class="sheet" id="sheet" style="display:none">
  <div class="row">
    <div><span>PARADAS</span><strong id="sp">0</strong></div>
    <div><span>DISTÂNCIA</span><strong id="sd">0 km</strong></div>
    <div class="gr"><span>LUCRO</span><strong id="sl">R$0</strong></div>
  </div>
  <button class="btn-start" onclick="iniciar()">▶ INICIAR ROTA</button>
  <div class="stops" id="stopsList"></div>
</div>

<script>
var map = L.map('map', { zoomControl: false }).setView([-23.55, -46.63], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

var allMarkers = [], rotaData = null;
var saved = localStorage.getItem('rl_paradas');
if (saved) {
  try {
    rotaData = JSON.parse(saved);
    renderizarMapa(rotaData);
  } catch(e) {}
}

function getColor(tipo) {
  if (tipo === 'condominio') return '#FFD700';
  if (tipo === 'apto') return '#FF9800';
  return '#00C853';
}

function renderizarMapa(data) {
  document.getElementById('sheet').style.display = 'block';
  document.getElementById('clockBox').style.display = 'block';
  allMarkers.forEach(function(m){ map.removeLayer(m); });
  allMarkers = [];
  var pts = [];
  var paradas = data.paradas || data.order || [];
  paradas.forEach(function(p, i) {
    pts.push([p.lat, p.lng]);
    var color = getColor(p.tipo);
    var icon = L.divIcon({ className: '', html: '<div style="width:36px;height:44px;position:relative;display:grid;place-items:center;font-weight:800;color:#fff;font-size:14px"><div style="position:absolute;width:36px;height:36px;background:'+color+';border-radius:50% 50% 50% 0;transform:rotate(-45deg);top:0;left:0;border:3px solid #fff"></div><span style="position:relative;z-index:1">'+(i+1)+'</span></div>', iconSize: [36, 44], iconAnchor: [18, 40] });
    var m = L.marker([p.lat, p.lng], { icon: icon }).addTo(map);
    m.bindPopup('<b>'+(i+1)+'. '+(p.nome||'Parada')+'</b><br><small>'+(p.tipo||'casa').toUpperCase()+'</small>');
    allMarkers.push(m);
  });
  if (pts.length > 1) L.polyline(pts, { color: '#00C853', weight: 5, opacity: .9 }).addTo(map);
  if (pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.15));
  document.getElementById('sp').textContent = data.totalParadas || paradas.length;
  document.getElementById('sd').textContent = (data.totalKm || 0).toFixed(1) + ' km';
  document.getElementById('sl').textContent = 'R$ ' + (data.lucroEstimado || 0).toFixed(2);
  var agora = new Date(), fim = new Date(agora.getTime() + (data.totalMin || 60) * 60000);
  document.getElementById('tempoTermino').textContent = fim.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('infoTermino').textContent = (data.totalParadas || paradas.length) + ' PARADAS • ' + (data.totalKm || 0).toFixed(1) + ' KM';
  var h = '';
  paradas.forEach(function(p, i) {
    h += '<div class="stop-item"><div class="stop-num" style="background:'+getColor(p.tipo)+'">'+(i+1)+'</div><div class="stop-info"><div class="addr">'+p.nome+'</div><div class="meta">'+(p.bairro||'')+' • '+(p.tipo||'casa').toUpperCase()+'</div></div></div>';
  });
  document.getElementById('stopsList').innerHTML = h;
  localStorage.setItem('rl_ultima_rota', JSON.stringify(data));
}

function gps() {
  if (navigator.geolocation) navigator.geolocation.getCurrentPosition(function(p) {
    map.setView([p.coords.latitude, p.coords.longitude], 16);
    L.circleMarker([p.coords.latitude, p.coords.longitude], { radius: 8, color: '#fff', fillColor: '#0057FF', fillOpacity: 1 }).addTo(map);
  });
}
function reorg() { if (rotaData) renderizarMapa(rotaData); }
function verTudo() {
  if (allMarkers.length) map.fitBounds(L.featureGroup(allMarkers).getBounds().pad(0.1));
}
function iniciar() {
  if (allMarkers.length > 0) {
    map.flyTo(allMarkers[0].getLatLng(), 17, { duration: 1.5 });
    setTimeout(function(){ allMarkers[0].openPopup(); }, 1600);
  }
}
</script>
</body>
</html>
