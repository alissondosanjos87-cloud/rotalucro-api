<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>RotaLucro - Mapa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#0a0f1a;--card:#111827;--green:#00C853;--blue:#0057FF;--text:#fff;--muted:#94A3B8;--border:rgba(255,255,255,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#000;color:var(--text);overflow:hidden;height:100dvh}
#map{position:absolute;inset:0;z-index:1}
.topbar{position:absolute;top:12px;left:12px;right:12px;z-index:1000;display:flex;justify-content:space-between;align-items:flex-start}
.menu-wrap{position:relative}
.menu-btn{width:44px;height:44px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.menu-drop{position:absolute;top:50px;left:0;display:none;flex-direction:column;gap:4px;z-index:1001}
.menu-drop.open{display:flex}
.menu-drop button{padding:10px 14px;border-radius:8px;border:0;font-weight:600;font-size:12px;cursor:pointer;background:rgba(0,0,0,.9);color:var(--text);text-align:left;white-space:nowrap}
.menu-drop button:active{background:var(--green);color:#000}
.clock-box{background:rgba(0,0,0,.9);padding:8px 12px;border-radius:10px;text-align:center;border:2px solid var(--blue)}
.clock-box .cl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.clock-box .ct{font-size:14px;font-weight:700;color:var(--blue)}
.clock-box .ce{font-size:10px;color:#aaa}
.sheet{position:absolute;bottom:0;left:0;right:0;z-index:1000;background:var(--card);border-radius:20px 20px 0 0;padding:12px 16px 16px;box-shadow:0 -8px 32px rgba(0,0,0,.6);border-top:3px solid var(--blue);max-height:58vh;display:flex;flex-direction:column}
.sheet .handle{width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 10px}
.sheet .row{display:grid;grid-template-columns:1fr 1fr 1.3fr;gap:8px;margin-bottom:10px}
.sheet .row div{text-align:center}
.sheet .row span{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.sheet .row strong{display:block;font-size:18px;font-weight:800;margin-top:2px}
.sheet .row .gr strong{color:var(--green)}
.btn-start{width:100%;height:48px;background:var(--green);color:#000;border:0;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer;flex-shrink:0}
.stops{overflow-y:auto;flex:1;margin-top:8px;min-height:0}
.stop-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.stop-num{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:12px;color:#fff;flex-shrink:0}
.stop-info{flex:1;min-width:0}
.stop-info .addr{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop-info .meta{font-size:10px;color:var(--muted)}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;padding:10px 18px;border-radius:10px;font-weight:600;font-size:13px;z-index:2000;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.pin{width:36px;height:44px;position:relative;display:grid;place-items:center;font-weight:800;color:#fff;font-size:14px}
.pin::before{content:"";position:absolute;width:36px;height:36px;background:currentColor;border-radius:50% 50% 50% 0;transform:rotate(-45deg);top:0;left:0;border:3px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.5)}
.pin span{position:relative;z-index:1}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;text-align:center;padding:20px}
.empty .icon{font-size:48px;margin-bottom:16px}
.empty h3{font-size:18px;margin-bottom:8px}
.empty p{color:var(--muted);font-size:14px;margin-bottom:20px}
.empty button{padding:14px 24px;background:var(--green);color:#000;border:0;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer}
</style>
</head>
<body>
<div id="map"></div>
<div class="topbar">
  <div class="menu-wrap">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="menu-drop" id="menuDrop">
      <button onclick="gps()">📍 GPS</button>
      <button onclick="reorg()">🔄 REORG.</button>
      <button onclick="verTudo()">🗺️ VER TUDO</button>
      <button onclick="otimizar()">🚀 OTIMIZAR</button>
      <button onclick="window.location.href='/home.html'">📂 NOVA ROTA</button>
    </div>
  </div>
  <div class="clock-box" id="clockBox" style="display:none">
    <div class="cl">⏱ TÉRMINO</div>
    <div class="ct" id="tempoTermino">--:--</div>
    <div class="ce" id="infoTermino"></div>
  </div>
</div>

<div class="sheet" id="sheet" style="display:none">
  <div class="handle"></div>
  <div class="row">
    <div><span>PARADAS</span><strong id="sp">0</strong></div>
    <div><span>DISTÂNCIA</span><strong id="sd">0 km</strong></div>
    <div class="gr"><span>LUCRO</span><strong id="sl">R$0</strong></div>
  </div>
  <button class="btn-start" onclick="iniciar()">▶ INICIAR ROTA</button>
  <div class="stops" id="stopsList"></div>
</div>

<div class="empty" id="emptyState">
  <div class="icon">📍</div>
  <h3>Nenhuma parada</h3>
  <p>Importe um arquivo ou digite os endereços para começar</p>
  <button onclick="window.location.href='/home.html'">+ Adicionar paradas</button>
</div>

<div class="toast" id="toast"></div>

<script>
var map,allMarkers=[],rotaData=null;

function initMapa(){
  map=L.map('map',{zoomControl:false,attributionControl:false}).setView([-23.55,-46.63],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  
  var saved=localStorage.getItem('rl_paradas');
  if(saved){
    try{
      rotaData=JSON.parse(saved);
      renderizarMapa(rotaData);
    }catch(e){}
  }
}

function toggleMenu(){document.getElementById('menuDrop').classList.toggle('open')}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2500)}

function getColor(tipo){
  if(tipo==='condominio')return'#FFD700';
  if(tipo==='apto')return'#FF9800';
  return'#00C853';
}

function renderizarMapa(data){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('sheet').style.display='flex';
  document.getElementById('clockBox').style.display='block';
  
  allMarkers.forEach(function(m){map.removeLayer(m)});
  allMarkers=[];
  
  var pts=[];
  data.paradas.forEach(function(p,i){
    pts.push([p.lat,p.lng]);
    var color=getColor(p.tipo);
    var icon=L.divIcon({className:'',html:'<div class="pin" style="color:'+color+'"><span>'+(i+1)+'</span></div>',iconSize:[36,44],iconAnchor:[18,40]});
    var m=L.marker([p.lat,p.lng],{icon:icon,tipo:p.tipo}).addTo(map);
    m.bindPopup('<b>'+(i+1)+'. '+(p.nome||'Parada')+'</b><br><small>'+(p.tipo||'casa').toUpperCase()+' • '+p.bairro+'</small>');
    allMarkers.push(m);
  });
  
  if(pts.length>1)L.polyline(pts,{color:'#00C853',weight:5,opacity:.9}).addTo(map);
  if(pts.length)map.fitBounds(L.latLngBounds(pts).pad(0.15));
  
  document.getElementById('sp').textContent=data.totalParadas||data.paradas.length;
  document.getElementById('sd').textContent=(data.totalKm||0).toFixed(1)+' km';
  document.getElementById('sl').textContent='R$ '+(data.lucroEstimado||(data.paradas.length*12.75)).toFixed(2);
  
  var agora=new Date(),fim=new Date(agora.getTime()+(data.totalMin||60)*60000);
  document.getElementById('tempoTermino').textContent=fim.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('infoTermino').textContent=(data.totalParadas||data.paradas.length)+' PARADAS • '+(data.totalKm||0).toFixed(1)+' KM';
  
  var h='';
  data.paradas.forEach(function(p,i){
    h+='<div class="stop-item"><div class="stop-num" style="background:'+getColor(p.tipo)+'">'+(i+1)+'</div><div class="stop-info"><div class="addr">'+p.nome+'</div><div class="meta">'+(p.bairro||'')+' • '+(p.tipo||'casa').toUpperCase()+'</div></div></div>';
  });
  document.getElementById('stopsList').innerHTML=h;
  
  // Salva última rota
  localStorage.setItem('rl_ultima_rota',JSON.stringify(data));
  
  // Adiciona ao histórico
  var hist=JSON.parse(localStorage.getItem('rl_historico')||'[]');
  hist.unshift({data:new Date().toISOString(),paradas:data.totalParadas||data.paradas.length,km:(data.totalKm||0).toFixed(1),lucro:(data.lucroEstimado||0).toFixed(2)});
  localStorage.setItem('rl_historico',JSON.stringify(hist.slice(0,10)));
}

function gps(){
  if(navigator.geolocation)navigator.geolocation.getCurrentPosition(function(p){map.setView([p.coords.latitude,p.coords.longitude],16);L.circleMarker([p.coords.latitude,p.coords.longitude],{radius:8,color:'#fff',fillColor:'#0057FF',fillOpacity:1}).addTo(map)});
  toast('📍 GPS ativado');
}
function reorg(){if(rotaData)renderizarMapa(rotaData);toast('🔄 Reorganizado')}
function verTudo(){if(allMarkers.length){var g=L.featureGroup(allMarkers);map.fitBounds(g.getBounds().pad(0.1))};toast('🗺️ Visualização completa')}
function otimizar(){if(rotaData){renderizarMapa(rotaData);toast('🚀 Rota otimizada')}}
function iniciar(){if(allMarkers.length>0){map.flyTo(allMarkers[0].getLatLng(),17,{duration:1.5});setTimeout(function(){allMarkers[0].openPopup()},1600)};toast('🚀 Rota iniciada!')}

window.onload=initMapa;
</script>
</body>
</html>
