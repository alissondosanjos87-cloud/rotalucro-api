<script>
var map,allMarkers=[],rotaData=null;

function initMapa(){

  map=L.map('map',{
    zoomControl:false,
    attributionControl:false
  }).setView([-23.55,-46.63],13);

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {maxZoom:19}
  ).addTo(map);

  var saved=localStorage.getItem('rl_paradas');

  if(saved){

    try{

      rotaData=JSON.parse(saved);

      if(Array.isArray(rotaData)){

        rotaData={
          paradas:rotaData,
          totalParadas:rotaData.length,
          totalKm:rotaData.length*2,
          lucroEstimado:rotaData.length*12,
          totalMin:rotaData.length*5
        };
      }

      renderizarMapa(rotaData);

    }catch(e){

      console.log(e);
    }
  }
}

function toggleMenu(){
  document.getElementById('menuDrop')
  .classList.toggle('open');
}

function toast(m){

  var t=document.getElementById('toast');

  t.textContent=m;

  t.classList.add('show');

  clearTimeout(t._t);

  t._t=setTimeout(function(){
    t.classList.remove('show');
  },2500);
}

function getColor(tipo){

  if(tipo==='condominio')return'#FFD700';

  if(tipo==='apto')return'#FF9800';

  return'#00C853';
}

function renderizarMapa(data){

  document.getElementById('emptyState')
  .style.display='none';

  document.getElementById('sheet')
  .style.display='flex';

  document.getElementById('clockBox')
  .style.display='block';

  allMarkers.forEach(function(m){
    map.removeLayer(m);
  });

  allMarkers=[];

  var pts=[];

  data.paradas.forEach(function(p,i){

    pts.push([p.lat,p.lng]);

    var color=getColor(p.tipo);

    var icon=L.divIcon({
      className:'',
      html:'<div class="pin" style="color:'+color+'"><span>'+(i+1)+'</span></div>',
      iconSize:[36,44],
      iconAnchor:[18,40]
    });

    var m=L.marker([p.lat,p.lng],{
      icon:icon
    }).addTo(map);

    m.bindPopup(
      '<b>'+(i+1)+'. '+(p.nome||'Parada')+'</b>'
    );

    allMarkers.push(m);
  });

  if(pts.length>1){

    L.polyline(pts,{
      color:'#00C853',
      weight:5,
      opacity:.9
    }).addTo(map);
  }

  if(pts.length){

    map.fitBounds(
      L.latLngBounds(pts).pad(0.15)
    );
  }

  document.getElementById('sp').textContent=
  data.totalParadas;

  document.getElementById('sd').textContent=
  data.totalKm.toFixed(1)+' km';

  document.getElementById('sl').textContent=
  'R$ '+data.lucroEstimado.toFixed(2);

  var h='';

  data.paradas.forEach(function(p,i){

    h+='<div class="stop-item">'+
    '<div class="stop-num" style="background:'+getColor(p.tipo)+'">'+(i+1)+'</div>'+
    '<div class="stop-info">'+
    '<div class="addr">'+p.nome+'</div>'+
    '<div class="meta">'+(p.tipo||'casa').toUpperCase()+'</div>'+
    '</div></div>';
  });

  document.getElementById('stopsList').innerHTML=h;

  localStorage.setItem(
    'rl_ultima_rota',
    JSON.stringify(data)
  );

  if(!sessionStorage.getItem('histAdd')){

    var hist=JSON.parse(
      localStorage.getItem('rl_historico')||'[]'
    );

    hist.unshift({
      data:new Date().toISOString(),
      paradas:data.totalParadas,
      km:data.totalKm.toFixed(1),
      lucro:data.lucroEstimado.toFixed(2)
    });

    localStorage.setItem(
      'rl_historico',
      JSON.stringify(hist.slice(0,10))
    );

    sessionStorage.setItem('histAdd','1');
  }
}

function gps(){

  if(navigator.geolocation){

    navigator.geolocation.getCurrentPosition(function(p){

      map.setView([
        p.coords.latitude,
        p.coords.longitude
      ],16);

      L.circleMarker(
        [p.coords.latitude,p.coords.longitude],
        {
          radius:8,
          color:'#fff',
          fillColor:'#0057FF',
          fillOpacity:1
        }
      ).addTo(map);
    });
  }

  toast('📍 GPS ativado');
}

function reorg(){
  toast('🔄 Rota reorganizada');
}

function verTudo(){

  if(allMarkers.length){

    var g=L.featureGroup(allMarkers);

    map.fitBounds(g.getBounds().pad(0.1));
  }

  toast('🗺️ Visualização completa');
}

function otimizar(){
  toast('🚀 Rota otimizada');
}

function iniciar(){

  if(allMarkers.length>0){

    map.flyTo(
      allMarkers[0].getLatLng(),
      17,
      {duration:1.5}
    );

    setTimeout(function(){

      allMarkers[0].openPopup();

    },1600);
  }

  toast('🚀 Rota iniciada!');
}

window.onload=initMapa;
</script>
