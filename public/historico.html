<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>RotaLucro - Histórico</title>
<style>
:root{--bg:#0a0f1a;--card:#111827;--green:#00C853;--blue:#0057FF;--text:#fff;--muted:#94A3B8;--border:rgba(255,255,255,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding:20px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.back{width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;display:grid;place-items:center}
h1{font-size:22px;font-weight:700}
h1 span{color:var(--green)}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer}
.tab.active{background:var(--green);color:#000;border-color:var(--green)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.15s}
.card:active{transform:scale(.98)}
.card .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card .top-row .data{font-size:13px;font-weight:600}
.card .top-row .lucro{color:var(--green);font-weight:700;font-size:15px}
.card .meta{display:flex;gap:12px;font-size:12px;color:var(--muted)}
.card .meta span{display:flex;align-items:center;gap:4px}
.empty{text-align:center;padding:60px 20px}
.empty .icon{font-size:48px;margin-bottom:16px}
.empty h3{font-size:18px;margin-bottom:8px}
.empty p{color:var(--muted);font-size:14px;margin-bottom:20px}
.empty button{padding:14px 24px;background:var(--green);color:#000;border:0;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer}
.resumo{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center}
.resumo div span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.resumo div strong{display:block;font-size:20px;font-weight:800;margin-top:2px}
.resumo div.gr strong{color:var(--green)}
.acoes{display:flex;gap:8px;margin-top:8px}
.acoes button{flex:1;padding:8px;border-radius:8px;border:0;font-weight:600;font-size:12px;cursor:pointer}
.btn-reusar{background:var(--blue);color:#fff}
.btn-excluir{background:rgba(255,255,255,.06);color:var(--muted)}
</style>
</head>
<body>
<div class="header">
  <button class="back" onclick="history.back()">←</button>
  <h1>Rota<span>Lucro</span></h1>
</div>

<div class="tabs">
  <button class="tab active" onclick="filtrar('todas',this)">Todas</button>
  <button class="tab" onclick="filtrar('semana',this)">Esta semana</button>
  <button class="tab" onclick="filtrar('mes',this)">Este mês</button>
</div>

<div class="resumo" id="resumo">
  <div><span>Total Rotas</span><strong id="totalRotas">0</strong></div>
  <div><span>Total Km</span><strong id="totalKm">0</strong></div>
  <div class="gr"><span>Total Lucro</span><strong id="totalLucro">R$0</strong></div>
</div>

<div id="lista"></div>

<div class="empty" id="emptyState" style="display:none">
  <div class="icon">📋</div>
  <h3>Nenhuma rota</h3>
  <p>Crie sua primeira rota para ver o histórico</p>
  <button onclick="window.location.href='/home.html'">+ Criar rota</button>
</div>

<script>
var historico=[],filtroAtual='todas';

function carregar(){
  historico=JSON.parse(localStorage.getItem('rl_historico')||'[]');
  renderizar();
}

function filtrar(tipo,el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  filtroAtual=tipo;
  renderizar();
}

function renderizar(){
  var agora=new Date();
  var filtrado=historico;
  
  if(filtroAtual==='semana'){
    var umaSemana=new Date(agora.getTime()-7*24*60*60*1000);
    filtrado=historico.filter(function(h){return new Date(h.data)>umaSemana});
  }else if(filtroAtual==='mes'){
    var umMes=new Date(agora.getTime()-30*24*60*60*1000);
    filtrado=historico.filter(function(h){return new Date(h.data)>umMes});
  }
  
  if(filtrado.length===0){
    document.getElementById('lista').innerHTML='';
    document.getElementById('emptyState').style.display='block';
    document.getElementById('resumo').style.display='none';
    return;
  }
  
  document.getElementById('emptyState').style.display='none';
  document.getElementById('resumo').style.display='grid';
  
  var totalKm=0,totalLucro=0;
  filtrado.forEach(function(h){totalKm+=parseFloat(h.km||0);totalLucro+=parseFloat(h.lucro||0)});
  
  document.getElementById('totalRotas').textContent=filtrado.length;
  document.getElementById('totalKm').textContent=totalKm.toFixed(0)+' km';
  document.getElementById('totalLucro').textContent='R$ '+totalLucro.toFixed(2);
  
  var h='';
  filtrado.forEach(function(r,i){
    var d=new Date(r.data);
    var dataStr=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
    h+='<div class="card"><div class="top-row"><span class="data">📅 '+dataStr+'</span><span class="lucro">R$ '+r.lucro+'</span></div><div class="meta"><span>📦 '+r.paradas+' paradas</span><span>📏 '+r.km+' km</span></div><div class="acoes"><button class="btn-reusar" onclick="reusar('+i+')">🔄 Reutilizar</button><button class="btn-excluir" onclick="excluir('+i+')">🗑️</button></div></div>';
  });
  document.getElementById('lista').innerHTML=h;
}

function reusar(i){
  var rotas=JSON.parse(localStorage.getItem('rl_rotas_salvas')||'[]');
  if(rotas[i]){
    localStorage.setItem('rl_paradas',JSON.stringify(rotas[i]));
    window.location.href='/mapa.html';
  }
}

function excluir(i){
  if(confirm('Excluir esta rota do histórico?')){
    historico.splice(i,1);
    localStorage.setItem('rl_historico',JSON.stringify(historico));
    renderizar();
  }
}

window.onload=carregar;
</script>
</body>
</html>
