<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Histórico</title>

<style>
body{
  background:#0a0f1a;
  color:#fff;
  font-family:system-ui;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
}

button{
  cursor:pointer;
}

.btn{
  background:#00C853;
  border:0;
  color:#000;
  padding:10px 16px;
  border-radius:12px;
  font-weight:700;
}

.card{
  background:#111827;
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
}

.empty{
  opacity:.7;
}
</style>
</head>

<body>

<div class="top">
  <h1>📋 Histórico</h1>

  <button class="btn" id="btnVoltar">
    Voltar
  </button>
</div>

<div id="lista"></div>

<script>

document.getElementById('btnVoltar')
.addEventListener('click', function(){
  window.location.href = './home.html';
});

const lista = document.getElementById('lista');

const historico = JSON.parse(
  localStorage.getItem('rl_historico') || '[]'
);

if(historico.length === 0){

  lista.innerHTML = `
    <div class="empty">
      Nenhuma rota encontrada
    </div>
  `;

}else{

  let html = '';

  historico.forEach(function(item){

    html += `
      <div class="card">
        <h3>${item.paradas || 0} paradas</h3>
        <p>${item.km || 0} km</p>
        <strong>R$ ${item.lucro || 0}</strong>
      </div>
    `;

  });

  lista.innerHTML = html;

}

</script>

</body>
</html>
